<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATOTA | Modern Eğitim Ekosistemi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b', brand: { blue: '#2563eb', orange: '#ea580c' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        /* ANİMASYONLU LIQUID BACKGROUND */
        body { 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.5s ease; 
            scroll-behavior: smooth; 
            background: linear-gradient(135deg, #e0e7ff, #f1f5f9, #dbeafe);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #1e293b;
            position: relative;
            overflow-x: hidden;
        }
        .dark body {
            background: linear-gradient(135deg, #020617, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ARKA PLAN AMBİYANS KÜRELERİ (LIQUID FEEL) */
        .ambient-orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.4; animation: moveOrb 20s infinite alternate ease-in-out; pointer-events: none; }
        .orb-1 { width: 40vw; height: 40vw; background: #3b82f6; top: -10%; left: -10%; }
        .orb-2 { width: 35vw; height: 35vw; background: #ea580c; bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 30vw; height: 30vw; background: #8b5cf6; top: 40%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }
        .dark .ambient-orb { opacity: 0.15; }
        @keyframes moveOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        /* ÖZEL İMLEÇ (MOUSE) */
        body, html, * { cursor: url('data:image/svg+xml;utf8,<svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%232563eb" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, auto !important; }
        button, a, input, select, textarea, .cursor-pointer, [onclick] { cursor: url('data:image/svg+xml;utf8,<svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4l15 6-6.5 2L10 19 4 4z" fill="%23ea580c" stroke="%23ffffff" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, pointer !important; }

        /* GERÇEKÇİ LIQUID GLASSMORPHISM (CAM EFEKTİ) */
        .liquid-card {
            background: rgba(255, 255, 255, 0.25) !important;
            backdrop-filter: blur(24px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.4) !important;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07), inset 0 0 0 1px rgba(255, 255, 255, 0.3) !important;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease !important;
        }
        .dark .liquid-card {
            background: rgba(15, 23, 42, 0.4) !important; border: 1px solid rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.03) !important;
        }
        .liquid-card:hover { transform: translateY(-4px); box-shadow: 0 15px 45px 0 rgba(31, 38, 135, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.5) !important; }
        .dark .liquid-card:hover { box-shadow: 0 15px 45px 0 rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.1) !important; }
        
        .liquid-card-inner { background: rgba(255, 255, 255, 0.3) !important; backdrop-filter: blur(12px) !important; -webkit-backdrop-filter: blur(12px) !important; border: 1px solid rgba(255, 255, 255, 0.5) !important; }
        .dark .liquid-card-inner { background: rgba(0, 0, 0, 0.3) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; }

        .glass-sidebar { background: rgba(255, 255, 255, 0.15) !important; backdrop-filter: blur(30px) saturate(200%) !important; border-right: 1px solid rgba(255, 255, 255, 0.3) !important; }
        .dark .glass-sidebar { background: rgba(15, 23, 42, 0.3) !important; border-right: 1px solid rgba(255, 255, 255, 0.05) !important; }

        /* SAĞ TIK KORUMASI ANİMASYONU */
        .animate-float-up { animation: floatUp 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(10px) scale(0.9); } 20% { opacity: 1; transform: translateY(0) scale(1); } 80% { opacity: 1; transform: translateY(-20px) scale(1); } 100% { opacity: 0; transform: translateY(-30px) scale(1.1); } }

        .theme-blue .brand-bg { background-color: #2563eb; } .theme-blue .brand-text { color: #2563eb; }
        .theme-blue .sidebar-link.active { background-color: rgba(37, 99, 235, 0.8) !important; backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        
        .view-fade { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .logo-img { height: 45px; width: auto; object-fit: contain; }
        .filterable-item { transition: opacity 0.3s ease; }

        /* REELS STİLLERİ */
        .reels-container { scroll-snap-type: y mandatory; overflow-y: scroll; height: 100%; border-radius: 2rem; background: #000; -ms-overflow-style: none; scrollbar-width: none; position: relative; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        .reels-container::-webkit-scrollbar { display: none; }
        .reel-item { scroll-snap-align: start; height: 100%; width: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .video-player-layer { pointer-events: none; width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(203, 213, 225, 0.5); border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.5); }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-100 theme-blue overflow-x-hidden" id="main-body">

    <!-- ARKA PLAN AMBİYANS KÜRELERİ -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

        </nav>
        <section class="pt-48 pb-32 px-6 text-center">

    <!-- MAIN APP -->

        <aside class="w-full md:w-72 glass-sidebar flex flex-col sticky top-0 h-screen z-50 overflow-hidden text-slate-600 dark:text-slate-400 shrink-0">
            <div class="p-8"><img src="" alt="MATOTA Logo" id="sidebar-logo" class="logo-img cursor-pointer" onclick="navigate('dashboard')"></div>
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto custom-scrollbar" id="sidebar-nav"></nav>

                    <div class="overflow-hidden"><p class="text-sm font-black dark:text-white truncate drop-shadow-sm" id="user-name">...</p><p class="text-[9px] font-bold uppercase tracking-[0.15em]" id="user-role">...</p></div>
                </div>
                <button type="button" onclick="logout()" class="w-full py-3 text-red-500 hover:bg-red-500/10 rounded-2xl font-black text-[11px] uppercase tracking-widest transition hover:scale-105"><i class="fa-solid fa-power-off mr-1"></i> Çıkış Yap</button>
            </div>
        </aside>
        
        <main class="flex-1 bg-transparent h-screen overflow-y-auto custom-scrollbar flex flex-col relative" id="app-main-area">
            <header class="mb-8 flex justify-between items-center p-6 md:px-12 md:pt-12 shrink-0" id="main-header">
                <div><h1 class="text-4xl font-black text-slate-900 dark:text-white tracking-tight drop-shadow-sm" id="page-title">...</h1></div>
                <div class="flex items-center gap-3">
                    <button type="button" onclick="toggleViewMode()" class="w-12 h-12 flex items-center justify-center rounded-2xl liquid-card transition hover:scale-105 text-slate-600 dark:text-slate-300" title="Görünümü Değiştir"><i class="fa-solid fa-table-cells-large" id="view-mode-icon"></i></button>
                    <button type="button" onclick="toggleDarkMode()" class="w-12 h-12 flex items-center justify-center rounded-2xl liquid-card transition hover:scale-105 text-slate-600 dark:text-slate-300"><i class="fa-solid fa-moon dark:hidden"></i><i class="fa-solid fa-sun hidden dark:block text-white"></i></button>
                </div>
            </header>
            <div id="view-content" class="w-full flex-1 px-6 md:px-12 pb-12 max-w-7xl mx-auto view-fade"></div>
        </main>

                document.getElementById('view-content').innerHTML = `<div class="grid lg:grid-cols-3 gap-10 view-fade"><div class="lg:col-span-1"><div class="liquid-card p-8 rounded-[3rem] shadow-xl space-y-4 sticky top-24"><h4 class="font-black text-lg mb-4 italic uppercase tracking-tighter text-slate-800 dark:text-white drop-shadow-sm">Yeni Optik Analiz</h4><div id="analysis-setup" class="space-y-4"><select id="an-student" class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-bold outline-none focus:ring-2 focus:ring-blue-500" onchange="window.loadStudentTasks()"><option value="">Öğrenci Seçin</option>${(students||[]).map(s=>`<option value="${s.id}">${s.full_name}</option>`).join('')}</select><select id="an-type" class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-bold outline-none focus:ring-2 focus:ring-blue-500" onchange="window.loadStudentTasks()"><option value="exam">Sınav Analizi</option><option value="homework">Ödev Analizi</option></select><select id="an-task" class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-bold outline-none focus:ring-2 focus:ring-blue-500" onchange="window.updateAnalysisTitle()"><option value="">Önce öğrenci seçin</option></select><input type="text" id="an-title" placeholder="Test Adı (Örn: Üslü Sayılar - Test 1)" class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-bold uppercase outline-none focus:ring-2 focus:ring-blue-500"><input type="number" id="an-qcount" placeholder="Soru Sayısı (Örn: 20)" class="w-full p-4 rounded-xl liquid-card-inner font-black text-slate-800 dark:text-white outline-none focus:ring-2 focus:ring-blue-500"><button type="button" onclick="window.generateOpticForm()" class="w-full bg-blue-600 border border-white/20 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-lg transition hover:brightness-110">Optik Form Oluştur</button></div><div id="analysis-optic" class="hidden mt-6 space-y-4"></div></div></div><div class="lg:col-span-2 space-y-4">${filterUI}<div id="an-list-container">${listHTML}</div></div></div>`;
            } catch(e) { console.error("Teacher Analytics Error:", e); document.getElementById('view-content').innerHTML = '<div class="liquid-card p-10 rounded-[3rem] text-red-500 text-center font-bold">Hata oluştu.</div>'; }
        };

        window.loadStudentTasks = async function() { const sid = document.getElementById('an-student').value; const type = document.getElementById('an-type').value; const taskSelect = document.getElementById('an-task'); if(!sid) { taskSelect.innerHTML = '<option value="">Önce öğrenci seçin</option>'; return; } taskSelect.innerHTML = '<option value="">Yükleniyor...</option>'; if(type === 'exam') { let dt = []; const r = await supabaseClient.from('external_exams').select('id, title').eq('student_id', sid); if(!r.error) dt=r.data; taskSelect.innerHTML = dt && dt.length > 0 ? dt.map(d => `<option value="${d.id}">${d.title}</option>`).join('') : '<option value="">Sınav Bulunamadı</option>'; } else { let dt = []; const r = await supabaseClient.from('homeworks').select('id, title').eq('student_id', sid); if(!r.error) dt=r.data; taskSelect.innerHTML = dt && dt.length > 0 ? dt.map(d => `<option value="${d.id}">${d.title}</option>`).join('') : '<option value="">Ödev Bulunamadı</option>'; } window.updateAnalysisTitle(); }
        window.updateAnalysisTitle = function() { const taskSelect = document.getElementById('an-task'); if(taskSelect.options.length > 0 && taskSelect.value) { document.getElementById('an-title').value = taskSelect.options[taskSelect.selectedIndex].text + ' - Test 1'; } else { document.getElementById('an-title').value = ''; } };
        window.generateOpticForm = function() { const count = parseInt(document.getElementById('an-qcount').value); const taskId = document.getElementById('an-task').value; if(!taskId) return alert("Lütfen bir Görev seçin."); if(!count || count < 1) return alert("Soru sayısı girin."); let topicOptions = globalTopics.map(t => `<option value="${t}">${t}</option>`).join(''); let rows = ''; for(let i=1; i<=count; i++) { rows += `<div class="flex gap-2 items-center text-xs p-2 border-b border-white/10 dark:border-slate-700/50"><span class="font-black w-6 text-center text-slate-800 dark:text-white drop-shadow-sm">${i}</span><select id="topic-${i}" class="flex-1 p-3 rounded-lg liquid-card-inner outline-none font-bold text-slate-800 dark:text-white">${topicOptions}</select><select id="corr-${i}" class="w-16 p-3 rounded-lg bg-green-500 text-white outline-none font-black shadow-sm border border-white/20"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select><select id="stud-${i}" class="w-16 p-3 rounded-lg bg-blue-600 text-white outline-none font-black shadow-sm border border-white/20"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="-">Boş</option></select></div>`; } document.getElementById('analysis-optic').innerHTML = `<div class="flex gap-2 font-black text-[10px] text-slate-500 uppercase mb-2 px-2"><span class="w-6 text-center">No</span><span class="flex-1">Konu</span><span class="w-16 text-center">Doğru</span><span class="w-16 text-center">Öğrenci</span></div><div class="max-h-[400px] overflow-y-auto pr-2 liquid-card-inner rounded-2xl mb-4 custom-scrollbar shadow-inner border border-white/10">${rows}</div><button type="button" onclick="window.saveDetailedAnalysis()" class="w-full bg-green-500 border border-white/20 text-white py-4 rounded-xl font-black mt-2 uppercase shadow-lg transition hover:brightness-110">Analizi Mühürle</button><button type="button" onclick="document.getElementById('analysis-optic').classList.add('hidden'); document.getElementById('analysis-setup').classList.remove('hidden');" class="w-full liquid-card-inner py-3 rounded-xl font-bold mt-2 text-xs uppercase text-slate-800 dark:text-white transition hover:brightness-110">İptal</button>`; document.getElementById('analysis-setup').classList.add('hidden'); document.getElementById('analysis-optic').classList.remove('hidden'); }
        window.saveDetailedAnalysis = async function() { const sid = document.getElementById('an-student').value; const type = document.getElementById('an-type').value; const taskId = document.getElementById('an-task').value; const title = document.getElementById('an-title').value; const count = parseInt(document.getElementById('an-qcount').value); let correctCount = 0, wrongCount = 0, emptyCount = 0; let topicAnalysis = {}; let questionDetails = []; for(let i=1; i<=count; i++) { const topic = document.getElementById(`topic-${i}`).value; const corr = document.getElementById(`corr-${i}`).value; const stud = document.getElementById(`stud-${i}`).value; if(!topicAnalysis[topic]) topicAnalysis[topic] = { total: 0, correct: 0, wrong: 0, empty: 0 }; topicAnalysis[topic].total++; if(stud === '-') { emptyCount++; topicAnalysis[topic].empty++; } else if(stud === corr) { correctCount++; topicAnalysis[topic].correct++; } else { wrongCount++; topicAnalysis[topic].wrong++; } questionDetails.push({ no: i, topic: topic, correct: corr, student: stud }); } const payload = { student_id: sid, task_id: taskId, title: title, type: type, total_questions: count, correct_count: correctCount, wrong_count: wrongCount, empty_count: emptyCount, topic_analysis: topicAnalysis, question_details: questionDetails }; const { error } = await supabaseClient.from('detailed_analyses').insert([payload]); if(error) { alert("Hata: " + error.message); } else { const addedPoints = Math.round((correctCount / count) * 10); await supabaseClient.from('points').insert([{ student_id: sid, category: type === 'exam' ? 'Sınav Uygulama' : 'Ödev Yapma', amount: addedPoints }]); alert(`Analiz işlendi! Öğrenciye ${addedPoints} puan eklendi.`); window.renderTeacherAnalytics(); } }
        window.deleteAnalysisGroup = async function(taskId, studentId) { if(confirm("Silmek istediğinize emin misiniz?")) { const { data: analysesToDelete } = await supabaseClient.from('detailed_analyses').select('*').eq('task_id', taskId).eq('student_id', studentId); if (analysesToDelete) { for (let a of analysesToDelete) { const removedPoints = Math.round((a.correct_count / a.total_questions) * 10); await supabaseClient.from('points').insert([{ student_id: a.student_id, category: a.type === 'exam' ? 'Sınav Uygulama' : 'Ödev Yapma', amount: -removedPoints }]); } } const { error } = await supabaseClient.from('detailed_analyses').delete().eq('task_id', taskId).eq('student_id', studentId); if(error) alert(error.message); else { alert("Silindi!"); window.renderTeacherAnalytics(); } } }

        window.renderTeacherProgress = async function() {
            document.getElementById('page-title').innerText = 'Genel Gelişim Raporu'; const { data: students } = await supabaseClient.from('profiles').select('*').eq('role', 'student');
            document.getElementById('view-content').innerHTML = `<div class="liquid-card p-8 rounded-[3rem] shadow-sm mb-8 view-fade flex flex-wrap gap-4 items-center"><select id="prog-student" class="flex-1 p-4 rounded-xl liquid-card-inner outline-none text-sm font-bold text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500"><option value="">Öğrenci Seçin</option>${(students || []).map(s => `<option value="${s.id}">${s.full_name}</option>`).join('')}</select><input type="date" id="prog-date-start" class="p-4 rounded-xl liquid-card-inner outline-none font-bold text-xs text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500" title="Başlangıç Tarihi"><input type="date" id="prog-date-end" class="p-4 rounded-xl liquid-card-inner outline-none font-bold text-xs text-slate-800 dark:text-white focus:ring-2 focus:ring-blue-500" title="Bitiş Tarihi"><button type="button" onclick="window.loadStudentProgress()" class="bg-blue-600 border border-white/20 text-white px-8 py-4 rounded-xl font-black shadow-lg transition hover:brightness-110">Raporu Çıkar</button></div><div id="progress-content" class="view-fade"></div>`;
        }

        window.loadStudentProgress = async function() {
            const sid = document.getElementById('prog-student').value; const startDate = document.getElementById('prog-date-start').value; const endDate = document.getElementById('prog-date-end').value; if(!sid) return alert("Öğrenci seçiniz.");
            let analyses = []; const r = await supabaseClient.from('detailed_analyses').select('*').eq('student_id', sid); if(!r.error) analyses = r.data;
            if(!analyses || analyses.length === 0) { document.getElementById('progress-content').innerHTML = `<div class="liquid-card p-10 rounded-[3rem] text-center italic text-slate-500 font-bold uppercase text-xs">Veri bulunmuyor.</div>`; return; }
            let filteredAnalyses = analyses; if (startDate) filteredAnalyses = filteredAnalyses.filter(a => new Date(a.created_at) >= new Date(startDate)); if (endDate) filteredAnalyses = filteredAnalyses.filter(a => new Date(a.created_at) <= new Date(endDate + 'T23:59:59'));
            if(filteredAnalyses.length === 0) { document.getElementById('progress-content').innerHTML = `<div class="liquid-card p-10 rounded-[3rem] text-center italic text-slate-500 font-bold uppercase text-xs">Seçilen tarihlerde veri yok.</div>`; return; }
            let tQ = 0, tC = 0, tW = 0, tE = 0; let tStats = {};
            filteredAnalyses.forEach(a => { tQ += a.total_questions || 0; tC += a.correct_count || 0; tW += a.wrong_count || 0; tE += a.empty_count || 0; if(a.topic_analysis) { Object.keys(a.topic_analysis).forEach(t => { if(!tStats[t]) tStats[t] = { c: 0, total: 0 }; tStats[t].c += a.topic_analysis[t].correct || 0; tStats[t].total += a.topic_analysis[t].total || 0; }); } });
            const genSuccess = Math.round((tC / tQ) * 100) || 0;
            let topicsHtml = Object.keys(tStats).length > 0 ? Object.keys(tStats).map(t => { const s = tStats[t]; const rate = Math.round((s.c / s.total) * 100) || 0; const color = rate >= 70 ? 'bg-green-500' : (rate >= 40 ? 'bg-orange-500' : 'bg-red-500'); const textColor = rate >= 70 ? 'text-green-600 dark:text-green-400' : (rate >= 40 ? 'text-orange-500' : 'text-red-500'); return `<div class="mb-4"><div class="flex justify-between text-[10px] font-black uppercase mb-2"><span>${t}</span><span class="${textColor} drop-shadow-sm">%${rate} BAŞARI (${s.c}/${s.total})</span></div><div class="w-full liquid-card-inner rounded-full h-3 shadow-inner overflow-hidden border border-white/10"><div class="h-3 rounded-full ${color}" style="width: ${rate}%"></div></div></div>`; }).join('') : '<p class="text-xs italic text-slate-500">Konu detayı yok.</p>';
            document.getElementById('progress-content').innerHTML = `<div class="grid md:grid-cols-3 gap-6 mb-8"><div class="bg-blue-600 text-white p-8 rounded-[2.5rem] shadow-2xl text-center flex flex-col justify-center border border-white/20"><p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-2 drop-shadow-sm">Genel Başarı</p><p class="text-6xl font-black drop-shadow-lg">%${genSuccess}</p></div><div class="liquid-card p-8 rounded-[2.5rem] shadow-lg text-center flex flex-col justify-center"><p class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 drop-shadow-sm">Toplam Soru</p><p class="text-4xl font-black text-slate-800 dark:text-white drop-shadow-md">${tQ}</p></div><div class="liquid-card p-8 rounded-[2.5rem] shadow-lg flex justify-around items-center text-center"><div><p class="text-3xl font-black text-green-500 drop-shadow-md">${tC}</p><p class="text-[10px] font-bold text-slate-500 uppercase mt-1">Doğru</p></div><div><p class="text-3xl font-black text-red-500 drop-shadow-md">${tW}</p><p class="text-[10px] font-bold text-slate-500 uppercase mt-1">Yanlış</p></div><div><p class="text-3xl font-black text-slate-500 drop-shadow-md">${tE}</p><p class="text-[10px] font-bold text-slate-500 uppercase mt-1">Boş</p></div></div></div><div class="liquid-card p-10 rounded-[3rem] shadow-xl"><h4 class="font-black text-lg mb-6 italic text-slate-800 dark:text-white drop-shadow-sm">Konu Bazlı Kümülatif Analiz</h4>${topicsHtml}</div>`;
        }

        window.renderTeacherSettings = async function() { 
            document.getElementById('page-title').innerText = 'Sistem Kodları'; const types = ['study', 'sordur', 'lgs']; let html = '<div class="grid gap-10 view-fade">'; 
            for(let t of types) { const { data } = await supabaseClient.from('dynamic_content').select('html_content').eq('type', t).maybeSingle(); html += `<div class="liquid-card p-10 rounded-[3rem] transition hover:shadow-2xl shadow-xl"><h4 class="font-black mb-4 uppercase text-blue-500 text-[10px] tracking-widest italic drop-shadow-sm">${t} Modülü</h4><textarea id="code-${t}" class="w-full h-80 p-6 font-mono text-xs bg-slate-900/80 text-green-400 rounded-[2rem] outline-none border border-slate-700 mb-6 shadow-inner custom-scrollbar">${data?.html_content || ''}</textarea><button type="button" onclick="window.saveDynamicCode('${t}')" class="bg-blue-600 border border-white/20 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase shadow-lg transition hover:brightness-110">GÜNCELLE</button></div>`; } 
            document.getElementById('view-content').innerHTML = html + '</div>'; 
        }
        window.saveDynamicCode = async function(t) { const h = document.getElementById('code-' + t).value; const { error } = await supabaseClient.from('dynamic_content').upsert({ type: t, html_content: h }); if (!error) alert("Güncellendi!"); }
        window.deleteItem = async function(t, id, cb) { if(confirm("Emin misin?")) { const { error } = await supabaseClient.from(t).delete().eq('id', id); if(!error) cb(); else alert("Hata: " + error.message); } }

        window.renderTeacherMessages = async function() { 
            document.getElementById('page-title').innerText = 'Gelen Mesajlar'; const { data: m } = await supabaseClient.from('contact_messages').select('*').order('created_at', { ascending: false }); 
            document.getElementById('view-content').innerHTML = '<div class="grid md:grid-cols-2 gap-8 view-fade">' + ((m || []).map(msg => `<div class="p-8 liquid-card rounded-[2.5rem] shadow-md mb-4 transition hover:shadow-lg"><div class="flex justify-between items-start mb-4 border-b border-white/10 pb-4"><div><p class="font-black text-lg text-slate-800 dark:text-white drop-shadow-sm">${msg.full_name}</p><p class="text-xs text-slate-500 font-medium">${msg.email}</p></div><p class="text-[10px] font-black text-slate-400 italic">${new Date(msg.created_at).toLocaleString('tr-TR')}</p></div><p class="text-slate-700 dark:text-slate-300 text-sm leading-relaxed font-medium mb-4">${msg.message}</p><button type="button" onclick="window.deleteItem('contact_messages', '${msg.id}', window.renderTeacherMessages)" class="mt-auto text-red-500 bg-red-500/10 px-4 py-2 rounded-lg text-[10px] font-black uppercase transition hover:bg-red-500/20"><i class="fa-solid fa-trash mr-1"></i> Mesajı Sil</button></div>`).join('') || '<div class="liquid-card p-10 col-span-full rounded-[3rem] text-center italic text-slate-500 font-bold uppercase text-xs">Mesaj bulunmuyor.</div>') + '</div>'; 
        }

        window.renderTeacherPoints = async function() { 
            document.getElementById('page-title').innerText = 'Puan Sistemi'; const { data: s } = await supabaseClient.from('profiles').select('*').eq('role', 'student'); const { data: h } = await supabaseClient.from('points').select('*, profiles!points_student_id_fkey(full_name)').order('created_at', { ascending: false }).limit(5); 
            document.getElementById('view-content').innerHTML = `<div class="grid md:grid-cols-2 gap-10 view-fade"><form id="point-form" class="liquid-card p-8 rounded-[3rem] shadow-xl space-y-4 h-fit"><select id="p-student" class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-bold outline-none focus:ring-2 focus:ring-blue-500">${(s||[]).map(st => `<option value="${st.id}">${st.full_name}</option>`).join('')}</select><select id="p-category" class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-bold outline-none focus:ring-2 focus:ring-blue-500"><option>Derse Katılım</option><option>Ödev Yapma</option><option>Sınav Uygulama</option><option>Kanaat</option></select><input type="number" id="p-amount" placeholder="Puan Miktarı (+ veya -)" required class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-black outline-none focus:ring-2 focus:ring-blue-500"><button type="submit" class="w-full bg-blue-600 border border-white/20 text-white py-4 rounded-xl font-black uppercase shadow-lg transition hover:brightness-110">Puanı Gönder</button></form><div class="space-y-4"><h4 class="font-black text-[10px] uppercase text-slate-500 drop-shadow-sm mb-4 tracking-widest pl-2">Son Hareketler</h4>${(h||[]).map(pt => `<div class="p-5 liquid-card rounded-2xl flex justify-between items-center mb-3 shadow-sm transition hover:shadow-md"><div><p class="font-black text-sm text-slate-800 dark:text-white drop-shadow-sm">${pt.profiles?.full_name}</p><p class="text-[10px] text-slate-500 font-bold uppercase mt-1">${pt.category}</p></div><span class="font-black text-xl drop-shadow-sm ${pt.amount>=0?'text-green-500':'text-red-500'}">${pt.amount>0?'+':''}${pt.amount}</span></div>`).join('') || '<p class="text-slate-500 text-xs italic p-4">Kayıt yok.</p>'}</div></div>`; 
            document.getElementById('point-form').onsubmit = async (e) => { e.preventDefault(); const { error } = await supabaseClient.from('points').insert([{ student_id: document.getElementById('p-student').value, category: document.getElementById('p-category').value, amount: parseInt(document.getElementById('p-amount').value) }]); if(!error) { alert("Puan başarıyla gönderildi!"); window.renderTeacherPoints(); } else alert("Hata: " + error.message); }; 
        }

        window.renderTeacherStudents = async function() { 
            document.getElementById('page-title').innerText = 'Öğrenci Kayıt'; const { data: s } = await supabaseClient.from('profiles').select('*').eq('role', 'student'); 
            document.getElementById('view-content').innerHTML = `<div class="grid md:grid-cols-2 gap-10 view-fade"><form id="add-student-form" class="liquid-card p-8 rounded-[3rem] shadow-xl space-y-4 h-fit"><h4 class="font-black text-lg mb-4 italic uppercase tracking-tighter text-slate-800 dark:text-white drop-shadow-sm">Yeni Öğrenci Ekle</h4><input type="text" id="s-name" placeholder="Ad Soyad" required class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-medium outline-none focus:ring-2 focus:ring-blue-500"><input type="email" id="s-email" placeholder="E-posta" required class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-medium outline-none focus:ring-2 focus:ring-blue-500"><input type="password" id="s-pass" placeholder="Şifre" required class="w-full p-4 rounded-xl liquid-card-inner text-slate-800 dark:text-white font-medium outline-none focus:ring-2 focus:ring-blue-500"><button type="submit" class="w-full bg-blue-600 border border-white/20 text-white py-4 rounded-xl font-black uppercase shadow-lg transition hover:brightness-110 mt-2">Öğrenciyi Kaydet</button></form><div class="liquid-card rounded-[3rem] shadow-xl overflow-hidden flex flex-col h-fit max-h-[70vh]"><div class="p-6 border-b border-white/10 shrink-0"><h4 class="font-black text-[10px] uppercase text-slate-500 tracking-widest drop-shadow-sm">Kayıtlı Öğrenciler</h4></div><div class="flex-1 overflow-y-auto custom-scrollbar p-2">${(s||[]).map(st => `<div class="p-4 m-2 liquid-card-inner rounded-2xl flex justify-between items-center group transition hover:shadow-md"><div><p class="font-black text-slate-800 dark:text-white drop-shadow-sm text-sm">${st.full_name}</p><p class="text-[10px] text-slate-500 font-medium mt-1">${st.email}</p></div><button type="button" onclick="window.deleteItem('profiles', '${st.id}', window.renderTeacherStudents)" class="w-10 h-10 bg-red-500/20 text-red-500 rounded-xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition hover:scale-110 shadow-sm border border-red-500/30"><i class="fa-solid fa-trash"></i></button></div>`).join('') || '<p class="text-slate-500 p-10 text-center text-xs italic font-bold">Sistemde öğrenci yok.</p>'}</div></div></div>`; 
            document.getElementById('add-student-form').onsubmit = async (e) => { e.preventDefault(); const { error } = await supabaseClient.auth.signUp({ email: document.getElementById('s-email').value, password: document.getElementById('s-pass').value, options: { data: { full_name: document.getElementById('s-name').value, role: 'student' } } }); if(!error) { alert("Öğrenci Kaydedildi!"); window.renderTeacherStudents(); } else alert("Hata: " + error.message); }; 
        }
